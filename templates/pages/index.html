{% extends 'base.html' %}

{% block content %}
<div style="min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem;">
    <div class="fade-in" style="max-width: 800px;">
        <div style="display: flex; justify-content: center; margin-bottom: 2rem;">
            <div class="brand-dot" style="width: 24px; height: 24px;"></div>
        </div>
        <h1 style="font-size: 4rem; letter-spacing: -0.04em; margin-bottom: 1.5rem; color: var(--color-text);">Clean data. Clear insights.</h1>
        <p style="font-size: 1.25rem; color: #666; margin-bottom: 3rem; max-width: 600px; margin-left: auto; margin-right: auto;">
            The premium data cleaning & reporting automation platform. No login required. Just upload, clean, and export.
        </p>
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <a href="/upload" class="btn btn-primary" style="padding: 16px 32px; font-size: 1.1rem; border-radius: 50px;">Start Cleaning Data</a>
            <a href="/dashboard" class="btn btn-outline" style="padding: 16px 32px; font-size: 1.1rem; border-radius: 50px;">View Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
